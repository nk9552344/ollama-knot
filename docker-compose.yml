# =============================================================================
# ollama-knot — modular compose
#
# Every service is fully independent. Remove any block to use a local install.
# All inter-service URLs are configured via .env — change a URL there, not here.
#
# .env quick-start (copy to .env and adjust):
#   REDIS_URL=redis://host.docker.internal:6379/0
#   OLLAMA_URL=http://host.docker.internal:11434
#   MCP_G1_URL=http://host.docker.internal:8000/mcp
#
# Services and their host ports:
#   redis       → localhost:6379
#   ollama      → localhost:11434
#   mcp-g1      → localhost:8000
#   mcp-studio  → localhost:3000
#
# Swap a service for a local install:
#   1. Remove its block from this file.
#   2. Set the matching env var in .env to point to your local instance.
#
# Commands:
#   docker compose up -d            # start all
#   docker compose up -d mcp-g1    # start one service only
#   docker compose down
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # REDIS
  # Remove this block → set REDIS_URL in .env to your local Redis instance.
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: knot-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

  # ---------------------------------------------------------------------------
  # OLLAMA  (local LLM runtime)
  # Remove this block → set OLLAMA_URL in .env to your local Ollama instance.
  #
  # GPU acceleration (NVIDIA / Jetson):
  #   Requires nvidia-container-toolkit on the host.
  #   Uncomment the `deploy` block below to enable.
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      # Hint to use all available GPUs (ignored when no GPU present)
      OLLAMA_NUM_GPU: ${OLLAMA_NUM_GPU:-999}

    # ── NVIDIA GPU ────────────────────────────────────────────────────────────
    # Uncomment to enable GPU. Requires: nvidia-container-toolkit
    # https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/install-guide.html
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    # ─────────────────────────────────────────────────────────────────────────

  # ---------------------------------------------------------------------------
  # MCP-G1  (Unitree G1 policy server)
  # Remove this block → set MCP_G1_URL in .env to your local instance.
  # ---------------------------------------------------------------------------
  mcp-g1:
    image: neerajkumar1044/infosys-mcp-g1
    # build:
    #   context: ./mcp_g1
    container_name: mcp-g1
    restart: unless-stopped
    ports:
      - "${MCP_G1_PORT:-8000}:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux: resolves host machine IP
    environment:
      POLICY_REGISTRY_PATH: /app/policies.yaml
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379/0}
      COMMAND_QUEUE_NAME: ${COMMAND_QUEUE_NAME:-policy:commands}
      EVENT_QUEUE_NAME: ${EVENT_QUEUE_NAME:-policy:events}
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      MCP_STATELESS_HTTP: "true"
      MCP_JSON_RESPONSE: "true"
    volumes:
      - ${POLICY_REGISTRY_FILE:-./mcp_g1/policies.yaml}:/app/policies.yaml:ro

  # ---------------------------------------------------------------------------
  # MCP-STUDIO  (Next.js UI)
  # Remove this block to run the UI locally with `npm run dev`.
  # ---------------------------------------------------------------------------
  mcp-studio:
    image: neerajkumar1044/infosys-ollama-knot
    # build:
    #   context: ./knot
    container_name: knot
    restart: unless-stopped
    ports:
      - "${STUDIO_PORT:-3000}:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"   # Linux: resolves host machine IP
    environment:
      OLLAMA_HOST: ${OLLAMA_URL:-http://host.docker.internal:11434}
      DATA_DIR: /app/data
      NEXT_TELEMETRY_DISABLED: "1"
      MCP_BOOTSTRAP_ID: g1-policies
      MCP_BOOTSTRAP_NAME: unitree g1 controls
      MCP_BOOTSTRAP_URL: ${MCP_G1_URL:-http://host.docker.internal:8000/mcp}
      MCP_BOOTSTRAP_TRANSPORT: http
      MCP_BOOTSTRAP_DESCRIPTION: Queue Unitree G1 policies via Redis.
    volumes:
      - ./knot/data:/app/data

volumes:
  ollama_data:
  redis_data:
