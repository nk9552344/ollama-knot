# Policy registry for the G1 MCP server.
#
# Format:
#   policies:
#     - id: <unique string, the value pushed to Redis>
#       name: <human readable label>
#       description: <free text shown to the agent>
#
# Edit this file freely – the server re-reads it on every tool call,
# so changes take effect without a restart. Mount it into the container
# (see docker-compose.yml) or point POLICY_REGISTRY_PATH at it.

policies:
  - id: walk_policy_unitree_g1
    name: walking policy
    description: >
      This policy is used to walk the Unitree G1 robot.
      Takes some input parameters and produces a walking gait.

  - id: squats_policy_unitree_g1
    name: squats policy
    description: >
      This policy makes the Unitree G1 robot perform squats.
