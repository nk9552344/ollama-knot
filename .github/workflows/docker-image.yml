name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push-knot:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push infosys-ollama-knot
        uses: docker/build-push-action@v6
        with:
          context: ./knot
          file: ./knot/Dockerfile
          push: true
          # arm/v7 excluded: Turbopack (Next.js default bundler) does not
          # support linux/arm/v7. arm64 covers Pi 4+, Apple Silicon, Graviton.
          platforms: linux/amd64,linux/arm64
          tags: |
            neerajkumar1044/infosys-ollama-knot:latest
            neerajkumar1044/infosys-ollama-knot:${{ github.sha }}
          cache-from: type=registry,ref=neerajkumar1044/infosys-ollama-knot:cache
          cache-to: type=registry,ref=neerajkumar1044/infosys-ollama-knot:cache,mode=max

  build-and-push-mcp-g1:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push infosys-mcp-g1
        uses: docker/build-push-action@v6
        with:
          context: ./mcp_g1
          file: ./mcp_g1/Dockerfile
          push: true
          # Python slim supports arm/v7 fine — keeping all three platforms
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: |
            neerajkumar1044/infosys-mcp-g1:latest
            neerajkumar1044/infosys-mcp-g1:${{ github.sha }}
          cache-from: type=registry,ref=neerajkumar1044/infosys-mcp-g1:cache
          cache-to: type=registry,ref=neerajkumar1044/infosys-mcp-g1:cache,mode=max